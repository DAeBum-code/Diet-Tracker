function Ring({value,max,size=92,stroke=8,color,children}) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, pct=Math.min(value/(max||1),1), offset=circ*(1-pct), over=value>max;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={over?"#ff6b6b":color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1)"}}/>
      </svg>
      <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        {children}
      </div>
    </div>
  );
}

function MacroBar({label,value,max,color}) {
  const pct = Math.min((value/(max||1))*100,100);
  return (
    <div style={{flex:1,minWidth:70}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:3}}>
        <span>{label}</span><span>{value}/{max}g</span>
      </div>
      <div style={{height:5,borderRadius:3,background:"rgba(255,255,255,0.07)"}}>
        <div style={{height:"100%",borderRadius:3,background:color,width:`${pct}%`,transition:"width 0.5s"}}/>
      </div>
    </div>
  );
}

        </div>

          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:vi.length?8:0}}>
            {oi.map((e,i) => (
              <span key={i} style={{padding:"5px 12px",borderRadius:8,fontSize:11,background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.6)",border:"1px solid rgba(255,255,255,0.07)"}}>{e}</span>
            ))}
          </div>
        )}
        {vi.length > 0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {vi.map((e,i) => {
              const num = e.charAt(0);
              const wo = WORKOUTS[num];
              if (!wo) return <span key={i} style={{padding:"5px 12px",borderRadius:8,fontSize:11,background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.6)"}}>{e}</span>;
              return (
                <a key={i} href={wo.yt} target="_blank" rel="noopener noreferrer"
                  style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:600,background:wo.color+"15",color:wo.color,border:`1px solid ${wo.color}30`,textDecoration:"none"}}>
                  {wo.emoji+" "+e}
                </a>
              );
            })}
          </div>
        )}
      </div>
    );
  }
  return null;
}

// ── MAIN APP ──
function DietTracker() {
  const [data, setData] = useState(() => ({...EMPTY_DATA}));
  const [tab, setTab] = useState("today");
  const [selectedDate, setSelectedDate] = useState(getToday());
  const [customFood, setCustomFood] = useState({name:"",cal:"",carb:"",protein:"",fat:""});
  const [searchTerm, setSearchTerm] = useState("");
  const [planWeek, setPlanWeek] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const _r = localStorage.getItem("diet-tracker-all"); const r = _r ? {value:_r} : null;
        if (r && r.value) {
          const parsed = JSON.parse(r.value);
          setData({...EMPTY_DATA, ...parsed, goals:{...EMPTY_DATA.goals, ...(parsed.goals||{})}});
        }
      } catch(e) { console.log("load:", e); }
      finally { setLoaded(true); }
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(async () => {
      try { localStorage.setItem("diet-tracker-all", JSON.stringify(data)); }
      catch(e) { console.log("save:", e); }
    }, 500);
    return () => clearTimeout(t);
  }, [data, loaded]);

  useEffect(() => {
    if (planWeek === null) {
      const tp = PLAN_RAW.find(p => p.d === getToday());
      setPlanWeek(tp ? tp.wk : 1);
    }
  }, [planWeek]);

  const dk = selectedDate;
  const plan = PLAN_RAW.find(p => p.d === dk);
  const weekGoal = plan ? WEEK_GOALS[plan.wk] : WEEK_GOALS[1];
  const entries = data.entries[dk] || [];
  const water = entries.filter(e => e.type === "water").length;
  const foods = entries.filter(e => e.type === "food");
  const tc = data.checks[dk] || {};
  const tsc = data.snackChips[dk] || {};
  const tec = data.exerciseChips[dk] || {};
  const tem = data.exerciseMemo[dk] || "";
  const tr = data.ratings[dk] || "";
  const tl = data.lunchActual[dk] || "";
  const td = data.dinnerActual[dk] || "";
  const tm = data.memos[dk] || "";
  const totals = foods.reduce((a,f) => ({cal:a.cal+(f.cal||0),carb:a.carb+(f.carb||0),protein:a.protein+(f.protein||0),fat:a.fat+(f.fat||0)}), {cal:0,carb:0,protein:0,fat:0});
  const g = data.goals;
  const dayNum = plan ? daysBetween("2026-04-09", dk) + 1 : null;

  const up = (fn) => setData(prev => { const next = fn({...prev}); return next; });

  const addEntry = useCallback((entry) => {
    up(d => { d.entries = {...d.entries}; d.entries[dk] = [...(d.entries[dk]||[]), {...entry, id:Date.now(), time:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}]; return d; });
  }, [dk]);

  const removeEntry = useCallback((id) => {
    up(d => { d.entries = {...d.entries}; d.entries[dk] = (d.entries[dk]||[]).filter(e => e.id !== id); return d; });
  }, [dk]);

  const addWater = () => addEntry({type:"water"});
  const removeWater = () => { const l = [...entries].reverse().find(e => e.type==="water"); if(l) removeEntry(l.id); };

  const addFood = (food) => {
    addEntry({type:"food",name:food.name,cal:+food.cal||0,carb:+food.carb||0,protein:+food.protein||0,fat:+food.fat||0});
    setCustomFood({name:"",cal:"",carb:"",protein:"",fat:""});
    setSearchTerm("");
  };

  const toggleCheck = (k) => up(d => { d.checks={...d.checks}; d.checks[dk]={...(d.checks[dk]||{})}; d.checks[dk][k]=!d.checks[dk][k]; return d; });
  
  const toggleSnack = (chip) => up(d => {
    d.snackChips={...d.snackChips}; const cur={...(d.snackChips[dk]||{})};
    if(chip==="없음"){ d.snackChips[dk]=cur["없음"]?{}:{"없음":true}; }
    else { cur["없음"]=false; cur[chip]=!cur[chip]; d.snackChips[dk]=cur; }
    return d;
  });

  const toggleEx = (chip) => up(d => { d.exerciseChips={...d.exerciseChips}; const c={...(d.exerciseChips[dk]||{})}; c[chip]=!c[chip]; d.exerciseChips[dk]=c; return d; });

  const setField = (field, val) => up(d => { d[field]={...d[field]}; d[field][dk]=val; return d; });
  const setGoal = (k,v) => up(d => { d.goals={...d.goals}; d.goals[k]=+v; return d; });
  const setInbody = (k,v) => up(d => { d.inbody={...d.inbody}; d.inbody[dk]={...(d.inbody[dk]||{})}; d.inbody[dk][k]=v===""?"":+v; return d; });

  const weekDates = Array.from({length:7}).map((_,i) => {
    const d = new Date(dk); d.setDate(d.getDate()-6+i); return d.toISOString().slice(0,10);
  });

            {loaded && <span style={{fontSize:8,color:"rgba(16,185,129,0.5)"}}>{"💾"}</span>}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:3}}>
            {new Date(dk+"T12:00:00").toLocaleDateString("ko-KR",{month:"numeric",day:"numeric",weekday:"short"})}
            {dayNum && <span style={{marginLeft:8}}>{"Day "+dayNum}</span>}
          </div>
        </div>
        <input type="date" value={dk} onChange={e => setSelectedDate(e.target.value)}
          style={{...s.inp,padding:"5px 8px",fontSize:11,width:"auto"}}/>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,padding:"8px 20px 12px",overflowX:"auto",scrollbarWidth:"none"}}>

            background:tab===t.key?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.035)",
            color:tab===t.key?"#a5b4fc":"rgba(255,255,255,0.38)",
            border:tab===t.key?"1px solid rgba(99,102,241,0.25)":"1px solid transparent",
          }}>{t.icon+" "+t.label}</button>
        ))}
      </div>

      <div style={{padding:"0 20px"}}>

        {/* ═══ TODAY ═══ */}
        {tab === "today" && (
          <div>
            <div style={{...s.card,display:"flex",alignItems:"center",gap:18}}>
              <Ring value={Math.round(totals.cal)} max={weekGoal?.calories||g.calories} color="#818cf8">
                <div style={{fontSize:17,fontWeight:800,color:totals.cal>(weekGoal?.calories||g.calories)?"#ff6b6b":"#fff"}}>{Math.round(totals.cal)}</div>

            </div>

            <div style={{...s.card,background:"rgba(99,102,241,0.04)",borderColor:"rgba(99,102,241,0.1)",padding:"12px 16px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:2}}>{"🎬 홈트 영상"}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{"터치 → 유튜브"}</div>
            </div>

            {Object.entries(WORKOUTS).map(([key,wo]) => (
              <a key={key} href={wo.yt} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",color:"inherit"}}>
                <div style={{...s.card,cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:wo.color+"06",borderColor:wo.color+"18"}}>
                  <div style={{width:44,height:44,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:wo.color+"15",fontSize:22,flexShrink:0}}>{wo.emoji}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{key+". "+wo.name}</div></div>
                  <div style={{fontSize:18,color:wo.color,opacity:0.5}}>{"▶"}</div>
                </div>
              </a>
            ))}
          </div>
        )}

        {/* ═══ BODY ═══ */}
        {tab === "body" && (
          <div>
            <div style={s.card}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"rgba(255,255,255,0.65)"}}>{"📐 인바디 기록"}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:10}}>
                {new Date(dk+"T12:00:00").toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["weight","체중(kg)"],["fatPct","체지방(%)"],["muscle","골격근(kg)"],["bmi","BMI"],["fatKg","체지방량(kg)"],["bmr","기초대사량(kcal)"]].map(([k,l]) => (
                  <div key={k} style={{background:"rgba(255,255,255,0.025)",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:3}}>{l}</div>
                    <input type="number" step="0.01" placeholder="-" value={(data.inbody[dk]||{})[k]??""}
                      onChange={e => setInbody(k,e.target.value)}
                      style={{...s.inp,width:"100%",fontSize:14,fontWeight:700,padding:"5px 6px",color:"#10b981"}}/>
                  </div>
                ))}
              </div>
            </div>

            <div style={s.card}>
              <div style={s.label}>{"⚖️ 체중 추이 (7일)"}</div>
              <div style={{display:"flex",gap:4,alignItems:"flex-end",height:90,paddingBottom:18}}>
                {weekDates.map(d => {
                  const w = (data.inbody[d]||{}).weight;
                  const allW = weekDates.map(dd => (data.inbody[dd]||{}).weight).filter(Boolean);
                  const minW = allW.length ? Math.min(...allW)-1 : 50;
                  const maxW = allW.length ? Math.max(...allW)+1 : 80;
                  const range = maxW-minW || 1;
                  const dl = new Date(d+"T12:00:00").toLocaleDateString("ko-KR",{weekday:"narrow"});
                  if (!w) return (
                    <div key={d} style={{flex:1,textAlign:"center"}}>
                      <div style={{height:3,borderRadius:2,background:"rgba(255,255,255,0.04)",marginBottom:3}}/>
                      <div style={{fontSize:8,color:"rgba(255,255,255,0.2)"}}>{dl}</div>
                    </div>
                  );
                  const h = Math.max(6,((w-minW)/range)*65);
                  return (
                    <div key={d} style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:8,color:"rgba(255,255,255,0.4)",marginBottom:2}}>{w}</div>
                      <div style={{height:h,borderRadius:4,marginBottom:3,background:"linear-gradient(180deg,#10b981,#059669)"}}/>
                      <div style={{fontSize:8,color:d===getToday()?"#10b981":"rgba(255,255,255,0.2)"}}>{dl}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ═══ STATS ═══ */}
        {tab === "stats" && (
          <div>
            <div style={s.card}>
              <div style={s.label}>{"📊 주간 칼로리"}</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:5,height:120,paddingBottom:20,position:"relative"}}>
                <div style={{position:"absolute",left:0,right:0,bottom:20+(1/1.5)*100,borderTop:"1px dashed rgba(99,102,241,0.2)"}}/>
                {weekDates.map(d => {
                  const dc = (data.entries[d]||[]).filter(e => e.type==="food").reduce((acc,f) => acc+(f.cal||0),0);
                  const dp = PLAN_RAW.find(p => p.d===d);
                  const target = (dp ? WEEK_GOALS[dp.wk] : null)?.calories || g.calories;
                  const maxH = target*1.5;
                  const h = Math.max(3,(dc/maxH)*100);
                  const isT = d===getToday(), isSel = d===dk;
                  const dl = new Date(d+"T12:00:00").toLocaleDateString("ko-KR",{weekday:"narrow"});
                  return (
                    <div key={d} style={{flex:1,textAlign:"center",cursor:"pointer"}} onClick={() => setSelectedDate(d)}>
                      <div style={{height:h,borderRadius:4,marginBottom:3,
                        background:dc>target?"linear-gradient(180deg,#ff6b6b,#dc2626)":isSel?"linear-gradient(180deg,#818cf8,#6366f1)":"linear-gradient(180deg,rgba(99,102,241,0.3),rgba(99,102,241,0.12))",
                        transition:"height 0.4s",border:isSel?"1px solid rgba(129,140,248,0.35)":"none"}}/>
                      <div style={{fontSize:8,color:isT?"#818cf8":"rgba(255,255,255,0.25)",fontWeight:isT?700:400}}>{dl}</div>
                      <div style={{fontSize:7,color:"rgba(255,255,255,0.18)"}}>{dc>0?dc:""}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={s.card}>
              <div style={s.label}>{"🗓 30일 달성"}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                {PLAN_RAW.map(p => {
                  const dc = (data.entries[p.d]||[]).filter(e => e.type==="food").reduce((acc,f) => acc+(f.cal||0),0);
                  const target = (WEEK_GOALS[p.wk]||{}).calories || g.calories;
                  const ckCount = Object.values(data.checks[p.d]||{}).filter(Boolean).length;
                  const exCount = Object.values(data.exerciseChips[p.d]||{}).filter(Boolean).length;
                  const isT = p.d===getToday();
                  const dn2 = daysBetween("2026-04-09",p.d)+1;
                  let score = 0;
                  if (dc > 0 && dc <= target) score++;
                  if (ckCount >= 4) score++;
                  if (exCount >= 1) score++;
                  const hasAny = dc > 0 || ckCount > 0 || exCount > 0;
                  const emoji = score===3?"🔥":score===2?"👍":score===1?"😐":"";
                  const bg = score===3?"rgba(16,185,129,0.25)":score===2?"rgba(245,158,11,0.18)":score===1?"rgba(251,146,60,0.15)":hasAny?"rgba(99,102,241,0.1)":"rgba(255,255,255,0.025)";
                  const borderC = isT?"2px solid #818cf8":p.phase.includes("출장")?"1px solid rgba(245,158,11,0.25)":"1px solid rgba(255,255,255,0.035)";
                  const isFuture = p.d > getToday();
                  return (
                    <div key={p.d} onClick={() => {setSelectedDate(p.d);setTab("today");}}
                      style={{aspectRatio:"1",borderRadius:8,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        background:bg,border:borderC}}>
                      {emoji
                        ? <div style={{fontSize:16,lineHeight:1}}>{emoji}</div>
                        : <div style={{fontSize:isFuture?10:8,color:"rgba(255,255,255,0.22)"}}>{dn2}</div>
                      }
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:10,fontSize:9,color:"rgba(255,255,255,0.35)"}}>
                <span>{"🔥 완벽"}</span><span>{"👍 좋음"}</span><span>{"😐 부족"}</span><span>{"· 미기록"}</span>
              </div>
            </div>
          </div>
        )}

        {/* ═══ GOALS ═══ */}
        {tab === "goals" && (
          <div>
            <div style={{...s.card,background:"rgba(99,102,241,0.05)",borderColor:"rgba(99,102,241,0.12)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#a5b4fc",marginBottom:8}}>{"📋 주차별 추천 목표"}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:10}}>{"인바디 기준: 56.7kg · 체지방 31.9% · 골격근 20.86kg · BMI 22.4"}</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {[{w:1,l:"1주 적응기"},{w:2,l:"2주 본격감량"},{w:0,l:"출장 유지기"},{w:3,l:"3주 복귀+재가속"},{w:4,l:"4주 마무리"}].map(({w,l}) => {
                  const wg = WEEK_GOALS[w];
                  const isCur = plan && plan.wk === w;
                  return (
                    <div key={w} onClick={() => {setGoal("calories",wg.calories);setGoal("carb",wg.carb);setGoal("protein",wg.protein);setGoal("fat",wg.fat);}}
                      style={{padding:"10px 14px",borderRadius:10,cursor:"pointer",
                        background:isCur?"rgba(99,102,241,0.12)":"rgba(255,255,255,0.025)",
                        border:isCur?"1px solid rgba(99,102,241,0.25)":"1px solid rgba(255,255,255,0.05)",transition:"all 0.2s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:isCur?"#a5b4fc":"rgba(255,255,255,0.6)"}}>
                            {l}{isCur && <span style={{fontSize:9,color:"#818cf8",marginLeft:4}}>{"← 이번 주"}</span>}
                          </div>
                          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{wg.tip}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:13,fontWeight:800,color:isCur?"#818cf8":"rgba(255,255,255,0.5)"}}>{wg.calories}</div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>kcal</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:12,marginTop:6,fontSize:10,color:"rgba(255,255,255,0.35)"}}>
                        <span>{"탄 "+wg.carb+"g"}</span><span>{"단 "+wg.protein+"g"}</span><span>{"지 "+wg.fat+"g"}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginTop:8,textAlign:"center"}}>{"터치하면 해당 주차 목표로 설정됩니다"}</div>
            </div>

            <div style={s.card}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:"rgba(255,255,255,0.6)"}}>{"🎯 직접 조절"}</div>
              {[["calories","칼로리","kcal",1000,3000,50],["carb","탄수화물","g",50,400,10],["protein","단백질","g",30,250,5],["fat","지방","g",20,150,5],["water","수분(잔)","잔",1,15,1]].map(([k,l,u,mn,mx,st]) => (
                <div key={k} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.45)",marginBottom:4}}>
                    <span>{l}</span><span style={{fontWeight:700,color:"#a5b4fc"}}>{g[k]+" "+u}</span>
                  </div>
                  <input type="range" min={mn} max={mx} step={st} value={g[k]}
                    onChange={e => setGoal(k,e.target.value)}
                    style={{width:"100%",accentColor:"#6366f1"}}/>
                </div>
              ))}
            </div>

            <div style={{...s.card,background:"rgba(99,102,241,0.04)",borderColor:"rgba(99,102,241,0.1)"}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:6,color:"rgba(99,102,241,0.6)"}}>{"📥 데이터 내보내기"}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:8}}>기록된 데이터를 다운로드합니다.</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={() => {
                  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url; a.download = "diet-tracker-"+getToday()+".json"; a.click();
                  URL.revokeObjectURL(url);
                }} style={{...s.btn,padding:"8px 16px",fontSize:11,background:"rgba(99,102,241,0.12)",color:"#a5b4fc",border:"1px solid rgba(99,102,241,0.2)"}}>
                  JSON
                </button>
                <button onClick={() => {
                  const rows = [["날짜","Day","주차","먹은음식","칼로리합","탄수화물","단백질","지방","운동항목","운동메모","체크리스트","체중","체지방%","골격근","평가","메모"]];
                  PLAN_RAW.forEach(p => {
                    const dn = daysBetween("2026-04-09",p.d)+1;
                    const foods = (data.entries[p.d]||[]).filter(e=>e.type==="food");
                    const foodNames = foods.map(f=>f.name+"("+f.cal+"kcal)").join(" / ") || "";
                    const t = foods.reduce((a,f)=>({cal:a.cal+(f.cal||0),carb:a.carb+(f.carb||0),pro:a.pro+(f.protein||0),fat:a.fat+(f.fat||0)}),{cal:0,carb:0,pro:0,fat:0});
                    const exChips = Object.entries(data.exerciseChips[p.d]||{}).filter(([,v])=>v).map(([k])=>k).join(" / ") || "";
                    const exMemo = (data.exerciseMemo[p.d]||"").replace(/\n/g," ");
                    const ckList = CHECKS_LIST.filter(c=>(data.checks[p.d]||{})[c.key]).map(c=>c.label).join(" / ") || "";
                    const ib = data.inbody[p.d]||{};
                    const rt = data.ratings[p.d]||"";
                    const memo = (data.memos[p.d]||"").replace(/\n/g," ");
                    rows.push([p.d,dn,p.phase,foodNames,t.cal,t.carb,t.pro,t.fat,exChips,exMemo,ckList,ib.weight||"",ib.fatPct||"",ib.muscle||"",rt==="good"?"잘했다":rt==="ok"?"보통":rt==="bad"?"아쉬움":"",memo]);
                  });
                  let csv = "\uFEFF";
                  rows.forEach(r => { csv += r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(",") + "\n"; });
                  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url; a.download = "diet-tracker-"+getToday()+".csv"; a.click();
                  URL.revokeObjectURL(url);
                }} style={{...s.btn,padding:"8px 16px",fontSize:11,background:"rgba(16,185,129,0.12)",color:"#6ee7b7",border:"1px solid rgba(16,185,129,0.2)"}}>
                  엑셀(CSV)
                </button>
              </div>
            </div>

            <div style={{...s.card,background:"rgba(239,68,68,0.04)",borderColor:"rgba(239,68,68,0.1)"}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:6,color:"rgba(239,68,68,0.6)"}}>{"🗑 데이터 초기화"}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:8}}>모든 기록이 삭제됩니다.</div>
              <button onClick={async () => {
                if(confirm("정말 모든 데이터를 초기화할까요?")){
                  setData({...EMPTY_DATA,goals:{...EMPTY_DATA.goals}});
                  try{localStorage.removeItem("diet-tracker-all");}catch(e){}
                }
              }} style={{...s.btn,padding:"8px 16px",fontSize:11,background:"rgba(239,68,68,0.12)",color:"#fca5a5",border:"1px solid rgba(239,68,68,0.2)"}}>
                전체 초기화
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(DietTracker));
</script>
</body>
</html>
